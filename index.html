<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Trimble Connect – Objektlink</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Segoe UI, Arial, sans-serif;
      background: #f4f6f8;
    }

    #toolbar {
      height: 42px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 12px;
      box-sizing: border-box;
      gap: 12px;
    }

    #title {
      font-weight: 600;
      font-size: 14px;
    }

    #status {
      font-size: 13px;
      color: #444;
    }

    #viewer {
      width: 100%;
      height: calc(100% - 42px);
      border: none;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <div id="title">Trimble objekt‑test</div>
    <div id="status">Starter…</div>
  </div>

  <!-- Trimble Connect viewer -->
  <iframe
    id="viewer"
    src="https://web.connect.trimble.com/projects/53tq6e0UmJQ/viewer/3d/?modelId=Fxm58C9I4R4"
    allow="fullscreen"
  ></iframe>

  <!-- Workspace API (offisiell) -->
  <script src="https://components.connect trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    // ✅ Hardkodet test‑objekt (bekreftet gyldig)
    const TEST_ENTITY_ID = "0ozi9d6o1FjBovSWg$Ydi8";
    let hasZoomed = false;

    async function init() {
      const statusEl = document.getElementById("status");
      const iframe   = document.getElementById("viewer");

      try {
        statusEl.textContent = "Kobler til Trimble…";

        const api = await WorkspaceAPI.connect(iframe);

        statusEl.textContent = "Venter på viewer…";

        // ✅ Riktig trigger i web‑viewer
        api.viewer.addEventListener("sceneChanged", async () => {
          if (hasZoomed) return;
          hasZoomed = true;

          try {
            statusEl.textContent = "Finner objekt…";

            const objectIds = await api.viewer.convertToObjectIds({
              entityIds: [TEST_ENTITY_ID]
            });

            if (!objectIds || objectIds.length === 0) {
              statusEl.textContent = "❌ Objekt ikke funnet i modellen";
              console.warn("Fant ikke objekt:", TEST_ENTITY_ID);
              return;
            }

            statusEl.textContent = "Zoomer til objekt…";

            await api.viewer.setObjects({
              objectIds,
              mode: "set"
            });

            await api.viewer.fitObjects({
              objectIds
            });

            statusEl.textContent = "✅ Objekt valgt og zoomet";

          } catch (err) {
            console.error(err);
            statusEl.textContent = "❌ Feil under zoom";
          }
        });

      } catch (err) {
        console.error(err);
        statusEl.textContent = "❌ Feil ved lasting av viewer";
      }
    }

    window.addEventListener("load", init);
  </script>

</body>
</html>
