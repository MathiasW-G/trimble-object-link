<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Trimble Connect – Objekt test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Segoe UI, Arial, sans-serif;
    }

    #toolbar {
      height: 42px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
      box-sizing: border-box;
    }

    #status {
      font-size: 13px;
      color: #444;
    }

    #viewer {
      width: 100%;
      height: calc(100% - 42px);
      border: none;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <strong>Trimble objekt‑test</strong>
    <span id="status">Starter …</span>
  </div>

  <iframe
    id="viewer"
    src="https://web.connect.trimble.com/projects/53tq6e0UmJQ/viewer/3d/?modelId=Fxm58C9I4R4"
    allow="fullscreen"
  ></iframe>

  <!-- Offisiell Workspace API -->
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

 <script>
  const TEST_ENTITY_ID = "0ozi9d6o1FjBovSWg$Ydi8";

  async function init() {
    const status = document.getElementById("status");
    const iframe = document.getElementById("viewer");

    try {
      status.textContent = "Kobler til Trimble…";

      const api = await WorkspaceAPI.connect(iframe);

      status.textContent = "Venter på viewer…";

      // ✅ Vent på første viewer-event som indikerer at scene finnes
      api.viewer.addEventListener("sceneChanged", async () => {
        try {
          status.textContent = "Finner objekt…";

          const objectIds = await api.viewer.convertToObjectIds({
            entityIds: [TEST_ENTITY_ID]
          });

          if (!objectIds || objectIds.length === 0) {
            status.textContent = "❌ Objekt ikke funnet";
            console.warn("Fant ikke objekt:", TEST_ENTITY_ID);
            return;
          }

          status.textContent = "Zoomer til objekt…";

          await api.viewer.setObjects({
            objectIds,
            mode: "set"
          });

          await api.viewer.fitObjects({
            objectIds
          });

          status.textContent = "✅ Objekt valgt og zoomet";

        } catch (err) {
          console.error(err);
          status.textContent = "❌ Feil under zoom";
        }
      });

    } catch (err) {
      console.error(err);
      status.textContent = "❌ Feil ved lasting av viewer";
    }
  }

  window.addEventListener("load", init);
</script>


</body>
</html>
